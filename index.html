<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stock Radar Lite</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">

        <h1>📈 Stock Radar Lite</h1>

        <p class="subtitle">
            AI Smart Taiwan Stock Screener
        </p>

    </header>

    <main class="container">

        <section class="search-box">

            <input
                id="searchInput"
                type="text"
                placeholder="輸入股票代號或名稱">

        </section>

        <section class="toolbar">

            <span>AI 排名</span>

            <button>
                AI Score ▼
            </button>

        </section>

        <section id="stockList">

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
